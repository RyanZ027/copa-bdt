                        <input type="text" className="w-full bg-[#1a1a1a] border border-stone-700 rounded-lg px-4 py-2 text-white font-semibold focus:ring-2 focus:ring-yellow-600 outline-none transition-all placeholder-stone-600" value={team.playerName} onChange={(e) => handleTeamDataChange(index, 'playerName', e.target.value)} placeholder="Nome do Jogador" />
                      </div>
                      <div className="flex-1 w-full">
                        <label className="text-[10px] text-stone-500 font-bold uppercase tracking-widest ml-1 mb-1 block">Equipa</label>
                        <input type="text" className="w-full bg-[#1a1a1a] border border-stone-700 rounded-lg px-4 py-2 text-white font-semibold focus:ring-2 focus:ring-yellow-600 outline-none transition-all placeholder-stone-600" value={team.teamName} onChange={(e) => handleTeamDataChange(index, 'teamName', e.target.value)} placeholder="Equipa (Ex: Real Madrid)" />
                      </div>
                      <div className="sm:mt-5"><button onClick={() => handleRemoveTeam(team.id)} className="p-3 text-stone-500 hover:text-red-500 hover:bg-red-900/20 rounded-xl transition-colors"><i className="fa-solid fa-trash-can text-lg"></i></button></div>
                    </div>
                  ))}
                </div>
                <div className="p-6 bg-[#121212] border-t border-stone-800">
                  <div className="flex flex-col sm:flex-row items-center justify-between gap-4 mb-6">
                    <div className="flex items-center gap-2 text-stone-400 text-xs font-bold uppercase tracking-wide">
                      {teams.length === 4 && <span><i className="fa-solid fa-shield text-yellow-500 mr-1"></i> Formato: 4 Jogadores (Grupos Ida/Volta | 6 Rodadas)</span>}
                      {teams.length === 5 && <span><i className="fa-solid fa-shield text-yellow-500 mr-1"></i> Formato: 5 Jogadores (Formato CPR | Top 4 Semi)</span>}
                      {(teams.length === 6 || teams.length === 7) && <span><i className="fa-solid fa-shield text-orange-500 mr-1"></i> Formato: {teams.length} Jogadores (Formato CPR | Top 2 Semi, Play-in 3º ao 6º)</span>}
                      {teams.length === 8 && <span><i className="fa-solid fa-shield text-yellow-500 mr-1"></i> Formato: 8 Jogadores (2 Grupos de 4 Jogadores/Times | 3 Rodadas)</span>}
                    </div>
                  </div>
                  <button onClick={handleStartTournament} className="w-full bg-gradient-to-r from-yellow-600 to-yellow-500 text-black hover:brightness-110 font-black py-5 rounded-2xl shadow-[0_0_20px_rgba(234,179,8,0.3)] transition-all flex items-center justify-center space-x-3 text-xl uppercase tracking-widest">
                    <i className="fa-solid fa-play"></i><span>Dar o Pontapé Inicial</span>
                  </button>
                </div>
              </div>
            </div>
          );
        }

        return (
          <div className="space-y-6 animate-in fade-in">
            <div className="bg-[#0a0a0a] p-6 rounded-2xl shadow-xl border border-stone-800 flex flex-col md:flex-row md:items-center justify-between">
              <div>
                <h1 className="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-200 to-yellow-600 flex items-center gap-2 uppercase tracking-wider"><i className="fa-solid fa-trophy text-yellow-500"></i> {seasonName || `Copa BDT`}</h1>
                <p className="text-stone-400 text-sm font-semibold mt-1 uppercase tracking-widest">{phase === 'finished' ? 'Temporada Encerrada' : phase === 'playoffs' ? 'Fase Final (Mata-Mata)' : `Fase Inicial (Modo ${tournamentMode === 'selecoes' ? 'Seleções' : 'Clubes'}): Rodada ${currentRoundIndex + 1} de ${maxRounds}`}</p>
              </div>
              {phase === 'playing' && isOrganizer && (
                <button onClick={advanceRound} disabled={!isCurrentRoundFinished()} className={`mt-4 md:mt-0 py-3 px-6 rounded-xl font-bold flex items-center space-x-2 transition-all border ${isCurrentRoundFinished() ? 'bg-yellow-600 hover:bg-yellow-500 text-black border-yellow-500 shadow-[0_0_15px_rgba(234,179,8,0.3)] cursor-pointer' : 'bg-[#1a1a1a] text-stone-600 border-stone-800 cursor-not-allowed'}`}>
                  <span>Avançar Etapa</span><i className="fa-solid fa-chevron-right"></i>
                </button>
              )}
              {phase === 'playoffs' && playoffs?.stage === 'playin' && isOrganizer && (
                <button onClick={advanceToSemis} disabled={!(getMatchupStatus(playoffs.playins?.[0]).isFinished && getMatchupStatus(playoffs.playins?.[1]).isFinished)} className={`mt-4 md:mt-0 py-3 px-6 rounded-xl font-bold flex items-center space-x-2 transition-all border ${(getMatchupStatus(playoffs.playins?.[0]).isFinished && getMatchupStatus(playoffs.playins?.[1]).isFinished) ? 'bg-yellow-600 hover:bg-yellow-500 text-black border-yellow-500 shadow-[0_0_15px_rgba(234,179,8,0.3)] cursor-pointer' : 'bg-[#1a1a1a] text-stone-600 border-stone-800 cursor-not-allowed'}`}>
                  <span>Ir para as Semifinais</span><i className="fa-solid fa-chevron-right"></i>
                </button>
              )}
              {phase === 'playoffs' && playoffs?.stage === 'semifinals' && isOrganizer && (
                <button onClick={advanceToFinal} disabled={!(getMatchupStatus(playoffs.semifinals?.[0]).isFinished && getMatchupStatus(playoffs.semifinals?.[1]).isFinished)} className={`mt-4 md:mt-0 py-3 px-6 rounded-xl font-bold flex items-center space-x-2 transition-all border ${(getMatchupStatus(playoffs.semifinals?.[0]).isFinished && getMatchupStatus(playoffs.semifinals?.[1]).isFinished) ? 'bg-yellow-600 hover:bg-yellow-500 text-black border-yellow-500 shadow-[0_0_15px_rgba(234,179,8,0.3)] cursor-pointer' : 'bg-[#1a1a1a] text-stone-600 border-stone-800 cursor-not-allowed'}`}>
                  <span>Ir para a Grande Final</span><i className="fa-solid fa-chevron-right"></i>
                </button>
              )}
              {phase === 'playoffs' && playoffs?.stage === 'finals' && isOrganizer && (
                <button onClick={finishTournament} disabled={!areFinalsFinished()} className={`mt-4 md:mt-0 py-3 px-6 rounded-xl font-bold flex items-center space-x-2 transition-all border ${areFinalsFinished() ? 'bg-gradient-to-r from-yellow-600 to-yellow-500 text-black border-yellow-400 shadow-[0_0_20px_rgba(234,179,8,0.5)] cursor-pointer' : 'bg-[#1a1a1a] text-stone-600 border-stone-800 cursor-not-allowed'}`}>
                  <span>Encerrar Campeonato</span><i className="fa-solid fa-trophy"></i>
                </button>
              )}
              {phase === 'finished' && (
                <div className="flex flex-wrap justify-center gap-3 w-full md:w-auto">
                  <button onClick={() => setActiveTab('statistics')} className="mt-4 md:mt-0 py-3 px-6 rounded-xl font-bold flex items-center space-x-2 bg-yellow-500/10 text-yellow-500 hover:bg-yellow-500/20 border border-yellow-500/30 transition-all"><i className="fa-solid fa-chart-line"></i><span>Estatísticas</span></button>
                  {isOrganizer && (
                    <button onClick={resetForNewSeason} className="mt-4 md:mt-0 py-3 px-8 rounded-xl font-black flex items-center space-x-2 bg-emerald-600 hover:bg-emerald-500 text-white border border-emerald-400 shadow-[0_0_20px_rgba(16,185,129,0.3)] transition-all"><i className="fa-solid fa-rotate-right"></i><span>Preparar Próxima Copa</span></button>
                  )}
                </div>
              )}
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
              <div className="lg:col-span-7 space-y-6">
                {phase === 'playing' && rounds && rounds[currentRoundIndex] && (
                  <div className="bg-[#0a0a0a] p-6 rounded-2xl shadow-xl border border-stone-800">
                    <h2 className="text-xl font-black text-white mb-6 uppercase"><i className="fa-solid fa-play text-yellow-500 mr-2"></i> Rodada {currentRoundIndex + 1}</h2>
                    <div className="space-y-4">
                      {rounds[currentRoundIndex]?.matches?.map((m, idx) => (
                        <div key={m?.id || idx} className={`border rounded-xl p-4 md:p-6 transition-colors ${m?.isBye ? 'bg-yellow-900/10 border-yellow-900/30' : 'bg-[#121212] border-stone-800'}`}>
                          {m?.isBye ? (
                            <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                              <div className="flex items-center gap-3"><span className="bg-yellow-900/30 text-yellow-500 text-xs font-bold px-3 py-1.5 rounded-full border border-yellow-800/50">BYE / FOLGA</span><TeamDisplay id={m.team1} dark /></div>
                              <span className="text-sm font-semibold text-stone-400 bg-[#1a1a1a] px-3 py-1 rounded-lg border border-stone-800">Vitória Automática (+3 PTS)</span>
                            </div>
                          ) : (
                            <div className="flex items-center justify-between gap-2 md:gap-4">
                              <div className="flex-1 w-0"><TeamDisplay id={m?.team1} align="right" dark /></div>
                              <div className="flex items-center gap-2 bg-[#050505] p-2 rounded-lg border border-stone-800 shrink-0 shadow-inner">
                                <input type="number" disabled={!isOrganizer} min="0" value={m?.score1} onChange={(e) => handleSwissScoreChange(currentRoundIndex, idx, 'score1', e.target.value)} className="w-12 md:w-14 h-12 text-center text-xl font-black bg-[#1a1a1a] text-white border border-stone-700 rounded-md focus:ring-2 focus:ring-yellow-500 outline-none" />
                                <span className="font-bold text-stone-600 text-sm">X</span>
                                <input type="number" disabled={!isOrganizer} min="0" value={m?.score2} onChange={(e) => handleSwissScoreChange(currentRoundIndex, idx, 'score2', e.target.value)} className="w-12 md:w-14 h-12 text-center text-xl font-black bg-[#1a1a1a] text-white border border-stone-700 rounded-md focus:ring-2 focus:ring-yellow-500 outline-none" />
                              </div>
                              <div className="flex-1 w-0"><TeamDisplay id={m?.team2} align="left" dark /></div>
                            </div>
                          )}
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {phase === 'playoffs' && playoffs?.stage === 'playin' && playoffs?.playins && (
                  <div className="bg-[#0a0a0a] p-6 rounded-2xl shadow-xl border border-orange-900/30">
                    <h2 className="text-xl font-black text-white mb-6 uppercase"><i className="fa-solid fa-circle-exclamation text-orange-500 mr-2"></i> Play-in (Ida e Volta)</h2>
                    <div className="grid md:grid-cols-2 gap-6">
                      {playoffs.playins.map((match, idx) => {
                        const status = getMatchupStatus(match);
                        return (
                          <div key={idx} className="border border-stone-800 rounded-xl p-5 bg-[#121212] flex flex-col relative overflow-hidden">
                            {status.isFinished && <div className="absolute inset-0 bg-orange-900/10 pointer-events-none"></div>}
                            <div className="flex justify-between items-center mb-5 pb-3 border-b border-stone-800">
                              <h3 className="font-bold text-stone-300">{idx === 0 ? '3º vs 6º' : '4º vs 5º'}</h3>
                              {status.isFinished && <span className="bg-orange-900/30 border border-orange-800/50 text-orange-400 text-[10px] font-bold px-2 py-1 rounded-full uppercase shadow-sm">Avançou: {getTeamInfo(status.winner)?.playerName}</span>}
                            </div>
                            <div className="flex justify-between items-start mb-6 gap-2">
                              <div className="w-[45%]"><TeamDisplay id={match?.team1} align="center" dark /></div>
                              <div className="text-stone-600 font-bold text-xl mt-2">VS</div>
                              <div className="w-[45%]"><TeamDisplay id={match?.team2} align="center" dark /></div>
                            </div>
                            <div className="space-y-3 mt-auto">
                              <div className="flex items-center justify-between gap-2 bg-[#050505] p-2 rounded-lg border border-stone-800">
                                <span className="text-xs font-bold text-stone-500 w-12">IDA</span>
                                <input type="number" disabled={!isOrganizer} min="0" value={match?.leg1?.s1} onChange={e => handlePlayoffScore('playins', idx, 'leg1', 's1', e.target.value)} className="w-12 p-1 text-center font-bold border border-stone-700 rounded bg-[#1a1a1a] text-white focus:ring-2 focus:ring-orange-500 outline-none" />
                                <span className="text-stone-600 text-xs">x</span>
                                <input type="number" disabled={!isOrganizer} min="0" value={match?.leg1?.s2} onChange={e => handlePlayoffScore('playins', idx, 'leg1', 's2', e.target.value)} className="w-12 p-1 text-center font-bold border border-stone-700 rounded bg-[#1a1a1a] text-white focus:ring-2 focus:ring-orange-500 outline-none" />
                              </div>
                              <div className="flex items-center justify-between gap-2 bg-[#050505] p-2 rounded-lg border border-stone-800">
                                <span className="text-xs font-bold text-stone-500 w-12">VOLTA</span>
                                <input type="number" disabled={!isOrganizer} min="0" value={match?.leg2?.s1} onChange={e => handlePlayoffScore('playins', idx, 'leg2', 's1', e.target.value)} className="w-12 p-1 text-center font-bold border border-stone-700 rounded bg-[#1a1a1a] text-white focus:ring-2 focus:ring-orange-500 outline-none" />
                                <span className="text-stone-600 text-xs">x</span>
                                <input type="number" disabled={!isOrganizer} min="0" value={match?.leg2?.s2} onChange={e => handlePlayoffScore('playins', idx, 'leg2', 's2', e.target.value)} className="w-12 p-1 text-center font-bold border border-stone-700 rounded bg-[#1a1a1a] text-white focus:ring-2 focus:ring-orange-500 outline-none" />
                              </div>
                              {status.isTied && (
                                <div className="mt-2 pt-2 border-t border-orange-900/30">
                                  <div className="flex items-center justify-between gap-2 bg-orange-900/10 p-2 rounded-lg border border-orange-800/30">
                                    <span className="text-xs font-bold text-orange-600 w-12">PÊN</span>
                                    <input type="number" disabled={!isOrganizer} min="0" value={match?.pen?.s1} onChange={e => handlePlayoffScore('playins', idx, 'pen', 's1', e.target.value)} className="w-12 p-1 text-center font-bold border border-orange-700/50 rounded bg-[#1a1a1a] text-white focus:ring-2 focus:ring-orange-500 outline-none" />
                                    <span className="text-orange-700 text-xs">x</span>
                                    <input type="number" disabled={!isOrganizer} min="0" value={match?.pen?.s2} onChange={e => handlePlayoffScore('playins', idx, 'pen', 's2', e.target.value)} className="w-12 p-1 text-center font-bold border border-orange-700/50 rounded bg-[#1a1a1a] text-white focus:ring-2 focus:ring-orange-500 outline-none" />
                                  </div>
                                </div>
                              )}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}

                {phase === 'playoffs' && playoffs?.stage === 'semifinals' && playoffs?.semifinals && (
                  <div className="bg-[#0a0a0a] p-6 rounded-2xl shadow-xl border border-stone-800">
                    <h2 className="text-xl font-black text-white mb-6 uppercase"><i className="fa-solid fa-trophy text-yellow-500 mr-2"></i> Semifinais (Ida e Volta)</h2>
                    <div className="grid md:grid-cols-2 gap-6">
                      {playoffs.semifinals.map((match, idx) => {
                        const status = getMatchupStatus(match);
                        return (
                          <div key={idx} className="border border-stone-800 rounded-xl p-5 bg-[#121212] flex flex-col relative overflow-hidden">
                            {status.isFinished && <div className="absolute inset-0 bg-yellow-900/5 pointer-events-none"></div>}
                            <div className="flex justify-between items-center mb-5 pb-3 border-b border-stone-800">
                              <h3 className="font-bold text-stone-300">Semifinal {idx + 1}</h3>
                              {status.isFinished && <span className="bg-yellow-900/20 border border-yellow-700/30 text-yellow-500 text-[10px] font-bold px-2 py-1 rounded-full uppercase shadow-sm">Avançou: {getTeamInfo(status.winner)?.playerName}</span>}
                            </div>
                            <div className="flex justify-between items-start mb-6 gap-2">
                              <div className="w-[45%]"><TeamDisplay id={match?.team1} align="center" dark /></div>
                              <div className="text-stone-600 font-bold text-xl mt-2">VS</div>
                              <div className="w-[45%]"><TeamDisplay id={match?.team2} align="center" dark /></div>
                            </div>
                            <div className="space-y-3 mt-auto">
                              <div className="flex items-center justify-between gap-2 bg-[#050505] p-2 rounded-lg border border-stone-800">
                                <span className="text-xs font-bold text-stone-500 w-12">IDA</span>
                                <input type="number" disabled={!isOrganizer} min="0" value={match?.leg1?.s1} onChange={e => handlePlayoffScore('semifinals', idx, 'leg1', 's1', e.target.value)} className="w-12 p-1 text-center font-bold border border-stone-700 rounded bg-[#1a1a1a] text-white focus:ring-2 focus:ring-yellow-500 outline-none" />
                                <span className="text-stone-600 text-xs">x</span>
                                <input type="number" disabled={!isOrganizer} min="0" value={match?.leg1?.s2} onChange={e => handlePlayoffScore('semifinals', idx, 'leg1', 's2', e.target.value)} className="w-12 p-1 text-center font-bold border border-stone-700 rounded bg-[#1a1a1a] text-white focus:ring-2 focus:ring-yellow-500 outline-none" />
                              </div>
                              <div className="flex items-center justify-between gap-2 bg-[#050505] p-2 rounded-lg border border-stone-800">
                                <span className="text-xs font-bold text-stone-500 w-12">VOLTA</span>
                                <input type="number" disabled={!isOrganizer} min="0" value={match?.leg2?.s1} onChange={e => handlePlayoffScore('semifinals', idx, 'leg2', 's1', e.target.value)} className="w-12 p-1 text-center font-bold border border-stone-700 rounded bg-[#1a1a1a] text-white focus:ring-2 focus:ring-yellow-500 outline-none" />
                                <span className="text-stone-600 text-xs">x</span>
                                <input type="number" disabled={!isOrganizer} min="0" value={match?.leg2?.s2} onChange={e => handlePlayoffScore('semifinals', idx, 'leg2', 's2', e.target.value)} className="w-12 p-1 text-center font-bold border border-stone-700 rounded bg-[#1a1a1a] text-white focus:ring-2 focus:ring-yellow-500 outline-none" />
                              </div>
                              {status.isTied && (
                                <div className="mt-2 pt-2 border-t border-yellow-900/30">
                                  <div className="flex items-center justify-between gap-2 bg-yellow-900/10 p-2 rounded-lg border border-yellow-700/30">
                                    <span className="text-xs font-bold text-yellow-600 w-12">PÊN</span>
                                    <input type="number" disabled={!isOrganizer} min="0" value={match?.pen?.s1} onChange={e => handlePlayoffScore('semifinals', idx, 'pen', 's1', e.target.value)} className="w-12 p-1 text-center font-bold border border-yellow-600/50 rounded bg-[#1a1a1a] text-white focus:ring-2 focus:ring-yellow-500 outline-none" />
                                    <span className="text-yellow-700 text-xs">x</span>
                                    <input type="number" disabled={!isOrganizer} min="0" value={match?.pen?.s2} onChange={e => handlePlayoffScore('semifinals', idx, 'pen', 's2', e.target.value)} className="w-12 p-1 text-center font-bold border border-yellow-600/50 rounded bg-[#1a1a1a] text-white focus:ring-2 focus:ring-yellow-500 outline-none" />
                                  </div>
                                </div>
                              )}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}

                {phase === 'playoffs' && playoffs?.stage === 'finals' && playoffs?.final && playoffs?.thirdPlace && (
                  <div className="space-y-6">
                    <div className="bg-[#0a0a0a] p-6 rounded-2xl shadow-[0_0_40px_rgba(234,179,8,0.15)] border border-yellow-600/50 relative overflow-hidden">
                      <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-yellow-700 via-yellow-400 to-yellow-700"></div>
                      <h2 className="text-xl font-black text-yellow-500 mb-6 flex items-center justify-center gap-2 uppercase tracking-widest"><i className="fa-solid fa-star"></i> Grande Final <i className="fa-solid fa-star"></i></h2>
                      <div className="max-w-xl mx-auto relative z-10">
                        <div className="flex justify-between items-center mb-6 gap-4">
                          <div className="flex-1 bg-[#121212] p-4 rounded-xl border border-stone-800"><TeamDisplay id={playoffs.final?.team1} align="center" dark /></div>
                          <div className="text-stone-700 font-bold text-3xl">VS</div>
                          <div className="flex-1 bg-[#121212] p-4 rounded-xl border border-stone-800"><TeamDisplay id={playoffs.final?.team2} align="center" dark /></div>
                        </div>
                        <div className="flex items-center justify-center gap-4 bg-[#050505] p-4 rounded-xl border border-stone-800 shadow-inner max-w-sm mx-auto">
                          <input type="number" disabled={!isOrganizer} min="0" value={playoffs.final?.leg1?.s1} onChange={e => handlePlayoffScore('final', null, 'leg1', 's1', e.target.value)} className="w-20 h-16 text-3xl text-center font-black border border-stone-700 bg-[#1a1a1a] text-white rounded-lg focus:ring-2 focus:ring-yellow-500 outline-none" />
                          <span className="text-stone-600 font-bold text-xl">X</span>
                          <input type="number" disabled={!isOrganizer} min="0" value={playoffs.final?.leg1?.s2} onChange={e => handlePlayoffScore('final', null, 'leg1', 's2', e.target.value)} className="w-20 h-16 text-3xl text-center font-black border border-stone-700 bg-[#1a1a1a] text-white rounded-lg focus:ring-2 focus:ring-yellow-500 outline-none" />
                        </div>
                        {getMatchupStatus(playoffs.final).isTied && (
                          <div className="mt-4 max-w-sm mx-auto bg-yellow-900/10 p-4 rounded-xl border border-yellow-700/30">
                            <p className="text-center text-xs text-yellow-500 font-bold mb-2 uppercase">Pênaltis</p>
                            <div className="flex items-center justify-center gap-4">
                              <input type="number" disabled={!isOrganizer} min="0" value={playoffs.final?.pen?.s1} onChange={e => handlePlayoffScore('final', null, 'pen', 's1', e.target.value)} className="w-16 h-12 text-xl text-center font-bold border border-yellow-600/50 bg-[#1a1a1a] text-white rounded focus:ring-2 focus:ring-yellow-500 outline-none" />
                              <span className="text-yellow-700 font-bold">X</span>
                              <input type="number" disabled={!isOrganizer} min="0" value={playoffs.final?.pen?.s2} onChange={e => handlePlayoffScore('final', null, 'pen', 's2', e.target.value)} className="w-16 h-12 text-xl text-center font-bold border border-yellow-600/50 bg-[#1a1a1a] text-white rounded focus:ring-2 focus:ring-yellow-500 outline-none" />
                            </div>
                          </div>
                        )}
                        {getMatchupStatus(playoffs.final).isFinished && (
                          <div className="mt-8 text-center">
                            <div className="inline-block relative">
                              <div className="absolute inset-0 bg-yellow-500 blur-xl opacity-20 rounded-full"></div>
                              <span className="relative bg-gradient-to-r from-yellow-600 to-yellow-500 text-black font-black px-8 py-3 rounded-full text-xl shadow-[0_0_20px_rgba(234,179,8,0.4)] border border-yellow-300 uppercase tracking-widest flex items-center gap-3">
                                <i className="fa-solid fa-trophy"></i> {getTeamInfo(getMatchupStatus(playoffs.final).winner)?.playerName}
                              </span>
                            </div>
                          </div>
                        )}
                      </div>
                    </div>

                    <div className="bg-[#0a0a0a] p-6 rounded-2xl shadow-xl border border-stone-800">
                      <h2 className="text-sm font-bold text-stone-500 mb-6 flex items-center justify-center uppercase tracking-widest">Disputa de 3º Lugar</h2>
                      <div className="max-w-xl mx-auto">
                        <div className="flex justify-between items-center mb-4 gap-4">
                          <div className="flex-1"><TeamDisplay id={playoffs.thirdPlace?.team1} align="right" dark /></div>
                          <div className="flex items-center gap-2 bg-[#050505] p-2 rounded-lg border border-stone-800 shrink-0 shadow-inner">
                            <input type="number" disabled={!isOrganizer} min="0" value={playoffs.thirdPlace?.leg1?.s1} onChange={e => handlePlayoffScore('thirdPlace', null, 'leg1', 's1', e.target.value)} className="w-12 h-12 text-center text-xl font-bold border border-stone-700 bg-[#1a1a1a] text-white rounded focus:ring-2 focus:ring-orange-500 outline-none" />
                            <span className="font-bold text-stone-600 text-sm">X</span>
                            <input type="number" disabled={!isOrganizer} min="0" value={playoffs.thirdPlace?.leg1?.s2} onChange={e => handlePlayoffScore('thirdPlace', null, 'leg1', 's2', e.target.value)} className="w-12 h-12 text-center text-xl font-bold border border-stone-700 bg-[#1a1a1a] text-white rounded focus:ring-2 focus:ring-orange-500 outline-none" />
                          </div>
                          <div className="flex-1"><TeamDisplay id={playoffs.thirdPlace?.team2} align="left" dark /></div>
                        </div>
                        {getMatchupStatus(playoffs.thirdPlace).isTied && (
                          <div className="mt-3 flex justify-center items-center gap-3 bg-orange-900/10 py-2 px-4 rounded-lg border border-orange-800/30 w-max mx-auto">
                            <span className="text-xs font-bold text-orange-500 uppercase">Pênaltis:</span>
                            <input type="number" disabled={!isOrganizer} min="0" value={playoffs.thirdPlace?.pen?.s1} onChange={e => handlePlayoffScore('thirdPlace', null, 'pen', 's1', e.target.value)} className="w-10 h-8 text-center text-sm font-bold border border-orange-700 bg-[#1a1a1a] text-white rounded focus:ring-2 focus:ring-orange-500 outline-none" />
                            <span className="text-orange-700 text-xs">x</span>
                            <input type="number" disabled={!isOrganizer} min="0" value={playoffs.thirdPlace?.pen?.s2} onChange={e => handlePlayoffScore('thirdPlace', null, 'pen', 's2', e.target.value)} className="w-10 h-8 text-center text-sm font-bold border border-orange-700 bg-[#1a1a1a] text-white rounded focus:ring-2 focus:ring-orange-500 outline-none" />
                          </div>
                        )}
                        {getMatchupStatus(playoffs.thirdPlace).isFinished && (
                          <div className="mt-4 text-center">
                            <span className="text-orange-500 font-bold text-sm bg-orange-900/20 px-4 py-1.5 rounded-full border border-orange-800/30">3º Colocado: {getTeamInfo(getMatchupStatus(playoffs.thirdPlace).winner)?.playerName}</span>
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                )}
              </div>

              {phase !== 'finished' && (
                <div className="lg:col-span-5">
                  {tournamentFormat === '8_teams' ? (
                    <div className="space-y-4">
                      <StandingsTableUI title="Grupo A" data={standingsA} />
                      <StandingsTableUI title="Grupo B" data={standingsB} />
                    </div>
                  ) : (
                    <StandingsTableUI title={`Tabela - ${seasonName}`} data={standings} />
                  )}
                </div>
              )}

              {/* TELA: ENCERRADO - PÓDIO AUMENTADO */}
              {phase === 'finished' && (
                <div className="lg:col-span-12">
                  <div className="bg-[#0a0a0a] p-8 rounded-3xl shadow-2xl border border-stone-800 text-center relative overflow-hidden">
                    <div className="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-yellow-900/20 via-transparent to-transparent"></div>
                    <i className="fa-solid fa-trophy text-[100px] text-yellow-500 mx-auto mb-6 drop-shadow-[0_0_30px_rgba(234,179,8,0.4)] relative z-10 block"></i>
                    <h2 className="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-200 via-yellow-500 to-yellow-200 mb-2 uppercase tracking-tighter relative z-10">O Campeão foi coroado!</h2>
                    <p className="text-stone-400 font-medium mb-12 tracking-widest uppercase text-sm relative z-10">Verifique as Estatísticas para ver as posições completas.</p>
                    
                    <div className="flex flex-col md:flex-row justify-center items-end gap-4 md:gap-2 max-w-4xl mx-auto mt-16 relative z-10 h-80">
                      
                      <div className="order-2 md:order-1 w-full md:w-1/3 flex flex-col items-center">
                        <div className="mb-4"><TeamDisplay id={getMatchupStatus(playoffs?.final).loser} align="center" dark /></div>
                        <div className="bg-gradient-to-b from-stone-300 to-stone-500 w-full rounded-t-lg h-40 md:h-48 flex flex-col items-center justify-start pt-4 border border-stone-400/50 shadow-lg relative">
                          <span className="text-5xl font-black text-stone-800 opacity-50">2</span>
                          <div className="absolute -top-3 text-xs font-black bg-stone-900 text-white px-3 py-1 rounded shadow-md border border-stone-700">🥈 VICE</div>
                        </div>
                      </div>
                      
                      <div className="order-1 md:order-2 w-full md:w-2/5 flex flex-col items-center">
                        <div className="mb-4"><TeamDisplay id={getMatchupStatus(playoffs?.final).winner} align="center" dark /></div>
                        <div className="bg-gradient-to-b from-yellow-400 via-yellow-500 to-yellow-600 w-full rounded-t-lg h-56 md:h-64 flex flex-col items-center justify-start pt-6 border-2 border-yellow-300 shadow-[0_0_30px_rgba(234,179,8,0.3)] relative z-20">
                          <span className="text-7xl font-black text-yellow-900 opacity-60">1</span>
                          <div className="absolute -top-4 text-sm font-black bg-stone-900 text-yellow-500 px-4 py-1.5 rounded shadow-md border border-stone-700">🏆 CAMPEÃO</div>
                        </div>
                      </div>
                      
                      <div className="order-3 md:order-3 w-full md:w-1/3 flex flex-col items-center">
                        <div className="mb-4"><TeamDisplay id={getMatchupStatus(playoffs?.thirdPlace).winner} align="center" dark /></div>
                        <div className="bg-gradient-to-b from-orange-500 to-orange-700 w-full rounded-t-lg h-28 md:h-36 flex flex-col items-center justify-start pt-2 border border-orange-400/50 shadow-lg relative">
                          <span className="text-4xl font-black text-orange-950 opacity-50">3</span>
                          <div className="absolute -top-3 text-[10px] font-black bg-stone-900 text-orange-500 px-2 py-1 rounded shadow-md border border-stone-700">🥉 3º LUGAR</div>
                        </div>
                      </div>

                    </div>
                    
                    {/* NOVO: Aviso para usuários normais saberem o que está acontecendo */}
                    {!isOrganizer && (
                      <div className="mt-16 animate-pulse flex flex-col items-center justify-center relative z-10">
                        <div className="bg-stone-900/80 border border-stone-700 px-6 py-3 rounded-full text-stone-300 font-bold uppercase tracking-widest text-xs flex items-center gap-3 shadow-lg">
                          <i className="fa-solid fa-clock-rotate-left text-yellow-500"></i> Aguardando o organizador preparar a próxima copa...
                        </div>
                      </div>
                    )}
                    
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      };

      // --- RENDERS ---
      return (
        <div className="min-h-screen bg-[#000000] text-stone-200 font-sans relative pb-12">
          <input type="file" ref={logoInputRef} style={{ display: 'none' }} accept="image/*" onChange={handleLogoUpload} />
          
          <NavHeader />

          <div className="max-w-7xl mx-auto relative z-10 px-4 sm:px-6 lg:px-8">
            {activeTab === 'statistics' && renderStatistics()}
            {activeTab === 'ranking' && renderRanking()}
            {activeTab === 'tournament' && renderTournament()}
          </div>

          {renderModals()}
          
          <footer className="mt-16 pb-4 text-center relative z-10">
            <p className="text-[10px] text-stone-600 font-bold uppercase tracking-widest flex items-center justify-center gap-2">
              <i className="fa-solid fa-shield-halved"></i> Organizado e realizado pela CPR <i className="fa-solid fa-shield-halved"></i>
            </p>
          </footer>

          <div className="fixed top-[-10000px] left-[-10000px] pointer-events-none z-[-1]">
            <div id="premium-export-node" ref={exportRef} style={{ width: '1080px', height: '1350px', backgroundColor: '#050505', backgroundImage: 'radial-gradient(circle at top left, rgba(202,138,4,0.1) 0%, rgba(0,0,0,0) 60%)', color: '#ffffff', fontFamily: 'system-ui, -apple-system, sans-serif', padding: '100px 80px', display: 'none', flexDirection: 'column', position: 'relative', overflow: 'hidden', boxSizing: 'border-box' }}>
              
              <div style={{ position: 'absolute', left: '50%', top: '55%', transform: 'translate(-50%, -50%)', zIndex: 1, opacity: 0.05, width: '800px', display: 'flex', justifyContent: 'center' }}>
                <img src={customLogo} style={{ width: '100%', height: 'auto', objectFit: 'contain', filter: 'grayscale(100%)' }} onError={(e) => e.target.style.display = 'none'} />
              </div>

              <div style={{ zIndex: 10, position: 'relative', width: '100%', height: '100%', display: 'flex', flexDirection: 'column' }}>
                <div style={{ marginBottom: '60px', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', width: '100%' }}>
                  <div>
                    <h1 style={{ fontSize: '85px', fontWeight: 900, margin: 0, lineHeight: 1.1, letterSpacing: '-1px', color: '#facc15', textShadow: '0 4px 10px rgba(202,138,4,0.3)' }}>HALL DA FAMA<br />COPA BDT</h1>
                    <p style={{ fontSize: '26px', color: '#a8a29e', margin: '20px 0 0 0', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '2px' }}>Ranking Oficial - Bonde do Tigrão</p>
                  </div>
                  <div>
                     <img src={customLogo} style={{ width: '160px', height: '160px', objectFit: 'contain', backgroundColor: 'transparent' }} onError={(e) => { e.target.onerror=null; e.target.style.display='none'; }} />
                  </div>
                </div>

                <table style={{ width: '100%', borderCollapse: 'collapse', tableLayout: 'fixed', marginTop: '10px', flexGrow: 1 }}>
                  <thead>
                    <tr style={{ borderBottom: '1px solid rgba(255,255,255,0.1)' }}>
                      <th style={{ width: '12%', paddingBottom: '20px', fontSize: '22px', color: '#78716c', fontWeight: 'bold', textAlign: 'center', textTransform: 'uppercase', letterSpacing: '1px' }}>Pos</th>
                      <th style={{ paddingBottom: '20px', paddingLeft: '30px', fontSize: '22px', color: '#78716c', fontWeight: 'bold', textAlign: 'left', textTransform: 'uppercase', letterSpacing: '1px' }}>Jogador</th>
                      <th style={{ width: '20%', paddingBottom: '20px', fontSize: '22px', color: '#78716c', fontWeight: 'bold', textAlign: 'center', textTransform: 'uppercase', letterSpacing: '1px' }}>Títulos</th>
                      <th style={{ width: '20%', paddingBottom: '20px', fontSize: '22px', color: '#facc15', fontWeight: 'bold', textAlign: 'center', textTransform: 'uppercase', letterSpacing: '1px' }}>Pontos</th>
                    </tr>
                  </thead>
                  <tbody>
                    {sortedGlobalRanking.slice(0, 5).map((player, idx) => {
                      let numColor = '#78716c';
                      if (idx === 0) numColor = '#facc15';
                      else if (idx === 1) numColor = '#ffffff';
                      else if (idx === 2) numColor = '#f97316';
                      
                      return (
                        <tr key={idx} style={{ borderBottom: '1px solid rgba(255,255,255,0.05)' }}>
                          <td style={{ width: '12%', padding: '45px 0', fontSize: '56px', fontWeight: 900, color: numColor, textAlign: 'center' }}>{idx + 1}º</td>
                          <td style={{ padding: '45px 0 45px 30px', fontSize: '52px', fontWeight: 800, color: '#ffffff', letterSpacing: '-0.5px', textAlign: 'left' }}>{player?.name}</td>
                          <td style={{ width: '20%', padding: '45px 0', fontSize: '52px', fontWeight: 800, color: '#a8a29e', textAlign: 'center' }}>{player?.titles}</td>
                          <td style={{ width: '20%', padding: '45px 0', fontSize: '52px', fontWeight: 900, color: '#facc15', textAlign: 'center' }}>{player?.pts}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>

                <div style={{ marginTop: '50px', width: '100%', textAlign: 'center', paddingBottom: '20px' }}>
                  <span style={{ fontSize: '26px', fontWeight: 800, letterSpacing: '8px', color: '#57534e', textTransform: 'uppercase' }}>Copa BDT Oficial</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
